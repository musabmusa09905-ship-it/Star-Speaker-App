<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Heart of English student habit dashboard for daily English speaking practice, streaks, feedback, and weekly progress."
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/app-icon.png" />
    <meta name="application-name" content="Heart of English" />
    <meta name="apple-mobile-web-app-title" content="Heart of English" />
    <meta name="theme-color" content="#991B2E" />
    <title>Heart of English | Student Home</title>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("heartOfEnglishTheme");
          document.documentElement.dataset.theme = theme === "dark" ? "dark" : "light";
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
